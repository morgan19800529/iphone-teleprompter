<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Morgan 提词器" />
  <title>Morgan iPhone 提词器</title>
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" id="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">MORGAN STUDIO</p>
        <h1>iPhone 提词器</h1>
      </div>
      <button id="fullscreenBtn" class="icon-btn" type="button" aria-label="全屏">⛶</button>
    </header>

    <section class="editor-panel" id="editorPanel">
      <div class="ai-panel">
        <div class="ai-head">
          <h2>今天播什么？</h2>
          <button id="aiSettingsBtn" class="icon-btn small ghost" type="button" aria-label="AI 设置">⚙</button>
        </div>
        <input id="topicInput" type="text" placeholder="输入主题，例如：清迈生活一个月的真实开销" />
        <div class="ai-opts">
          <select id="kindSelect" aria-label="内容类型">
            <option value="live">直播</option>
            <option value="video">口播视频</option>
          </select>
          <select id="durationSelect" aria-label="时长"></select>
          <button id="generateBtn" class="primary" type="button">AI 生成稿子</button>
        </div>
        <p id="aiStatus" class="ai-status" hidden></p>
      </div>

      <details id="outlineBox" class="outline-box" hidden>
        <summary>本场提纲与留人节点</summary>
        <div id="outlineBody"></div>
      </details>

      <div class="script-bar">
        <select id="scriptSelect" aria-label="选择脚本"></select>
        <button id="newScriptBtn" class="icon-btn small" type="button" aria-label="新建脚本">＋</button>
      </div>
      <textarea id="scriptInput" spellcheck="false" placeholder="把口播稿粘贴到这里……"></textarea>
      <input id="fileInput" type="file" accept=".txt,.md,.markdown,text/plain,text/markdown" hidden />
      <div class="editor-actions minor">
        <button id="importBtn" class="secondary" type="button">导入文件</button>
        <button id="renameBtn" class="secondary" type="button">重命名</button>
        <button id="deleteBtn" class="secondary danger" type="button">删除脚本</button>
      </div>
      <div class="editor-actions">
        <button id="sampleBtn" class="secondary" type="button">载入示例</button>
        <button id="clearBtn" class="secondary danger" type="button">清空</button>
        <button id="startBtn" class="primary" type="button">开始提词</button>
      </div>
    </section>

    <section class="teleprompter" id="teleprompter">
      <div class="reading-guide" aria-hidden="true"></div>
      <article id="promptText" class="prompt-text"></article>
      <div id="tapHint" class="tap-hint" aria-hidden="true"></div>
    </section>

    <section class="controls" id="controls">
      <div class="control-row main-controls">
        <button id="restartBtn" type="button">↺</button>
        <button id="playPauseBtn" class="primary round" type="button">▶</button>
        <button id="editBtn" type="button">编辑</button>
      </div>

      <div class="slider-control">
        <div class="slider-label"><span>滚动速度</span><output id="speedValue">30</output></div>
        <input id="speedRange" type="range" min="5" max="100" value="30" />
      </div>

      <div class="slider-control">
        <div class="slider-label"><span>字体大小</span><output id="fontValue">44</output></div>
        <input id="fontRange" type="range" min="26" max="88" value="44" />
      </div>

      <div class="toggle-grid">
        <button id="mirrorBtn" class="toggle" type="button" aria-pressed="false">镜像：关</button>
        <button id="guideBtn" class="toggle active" type="button" aria-pressed="true">引导线：开</button>
        <button id="contrastBtn" class="toggle" type="button" aria-pressed="false">高对比</button>
      </div>
    </section>

    <div id="aiSettings" class="modal" hidden>
      <div class="modal-card">
        <h3>AI 设置</h3>
        <label for="apiKeyInput">Anthropic API Key</label>
        <input id="apiKeyInput" type="password" placeholder="sk-ant-..." autocomplete="off" />
        <label for="modelInput">模型</label>
        <input id="modelInput" type="text" placeholder="claude-sonnet-5" autocomplete="off" />
        <p class="note">密钥只保存在这台设备的浏览器里，不会上传到任何服务器。这是自用方案——正式对外发布时必须改成服务端代理，否则密钥会被他人取走盗刷。</p>
        <div class="modal-actions">
          <button id="apiCancelBtn" type="button">取消</button>
          <button id="apiSaveBtn" class="primary" type="button">保存</button>
        </div>
      </div>
    </div>

    <div id="countdown" class="countdown" hidden></div>
  </main>
  <script src="ai.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
